trigger:
- none

# ================= VARIABLES =================
variables:
  nodeVersion: '18.x'
  artifactName: 'RotaryFinanceAPI'

  deployRoot: '/home/ubuntu/RotaryFinanceAPI'
  releasesPath: '/home/ubuntu/RotaryFinanceAPI/releases'
  currentPath: '/home/ubuntu/RotaryFinanceAPI/current'
  tempDeployPath: '/home/azureagent/RotaryFinanceAPI'


# ================= BUILD STAGE =================
stages:
- stage: Build
  displayName: "Build Node Application"

  jobs:
  - job: BuildJob
    pool:
      name: Build-Pool

    steps:
    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install Node.js

    - task: Cache@2
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        path: 'node_modules'
      displayName: Cache npm packages

    - script: npm ci
      displayName: Install dependencies

    # Publish FULL project (not dist)
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.SourcesDirectory)'
        artifact: $(artifactName)
      displayName: Publish artifact


# ================= DEPLOY STAGE =================
- stage: Deploy
  displayName: "Deploy Node API to Linux"
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      name: UbuntuAws

    steps:
    - checkout: none

    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: $(artifactName)
        path: $(tempDeployPath)
      displayName: Download artifact


    # ===== ZERO DOWNTIME DEPLOY =====
    - script: |
        set -e
        sudo -u ubuntu bash << 'EOF'

        echo "Creating releases folder..."
        sudo mkdir -p $(releasesPath)

        RELEASE_DIR=$(releasesPath)/$(date +%Y%m%d%H%M%S)

        echo "Creating new release: $RELEASE_DIR"
        sudo mkdir -p $RELEASE_DIR

        echo "Copying files..."
        sudo rsync -av --exclude node_modules $(tempDeployPath)/ $RELEASE_DIR/

        echo "Installing dependencies on server..."
        cd $RELEASE_DIR
        npm ci --production

        echo "Switching symlink..."
        sudo ln -sfn $RELEASE_DIR $(currentPath)

        echo "Restarting PM2..."
        cd $(currentPath)
        pm2 reload all || pm2 start index.js --name RotaryFinanceAPI
        pm2 save
        EOF

      displayName: Zero downtime deploy with PM2


    # ===== CLEAN OLD RELEASES =====
    - script: |
        echo "Cleaning old releases (keeping last 5)..."
        ls -dt $(releasesPath)/* | tail -n +6 | sudo xargs -r rm -rf
      displayName: Cleanup old releases

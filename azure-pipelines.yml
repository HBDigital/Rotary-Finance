trigger:
- deploy

pool:
  name: UbuntuAws   # self-hosted Ubuntu agent

steps:
- checkout: self

# Use Node.js 18
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Use Node.js 18'

# Install dependencies in agent workspace
- script: |
    npm install 
  workingDirectory: $(Build.SourcesDirectory)
  displayName: 'Install dependencies'

# Copy files to runtime directory (owned by ubuntu)
- script: |
    sudo rsync -av --delete \
      $(Build.SourcesDirectory)/ \
      /home/ubuntu/TestFinance/
  displayName: 'Deploy to /home/ubuntu/TestFinance'

# Reload or start PM2 app AS ubuntu user
- script: |
    sudo -u ubuntu bash << 'EOF'
    cd /home/ubuntu/TestFinance

    EOF
  displayName: 'Reload PM2 app'


trigger:
  branches:
    include:
      - main

pool:
  name: UbuntuAws

steps:

# Checkout code
- checkout: self


# Use Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: Use Node.js


# Install dependencies (pipeline workspace)
- task: CmdLine@2
  displayName: Install dependencies
  inputs:
    script: |
      npm install
    workingDirectory: $(Build.SourcesDirectory)


# Create new release folder
- task: CmdLine@2
  displayName: Create Release Folder
  inputs:
    script: |

      RELEASE_NAME=RotaryFinanceAPI_$(date +%Y%m%d%H%M%S)

      echo "Release: $RELEASE_NAME"

      sudo -u ubuntu mkdir -p /home/ubuntu/TestFinance
      sudo -u ubuntu mkdir -p /home/ubuntu/TestFinance/$RELEASE_NAME

      echo "##vso[task.setvariable variable=RELEASE_NAME]$RELEASE_NAME"


# Copy files to release
- task: CmdLine@2
  displayName: Copy Files
  inputs:
    script: |

      sudo -u ubuntu rsync -av --delete \
      --exclude node_modules \
      --exclude .git \
      $(Build.SourcesDirectory)/ \
      /home/ubuntu/TestFinance/$(RELEASE_NAME)/


# Update current symlink
- task: CmdLine@2
  displayName: Update Current Release
  inputs:
    script: |

      sudo -u ubuntu ln -sfn \
      /home/ubuntu/TestFinance/$(RELEASE_NAME) \
      /home/ubuntu/TestFinance/current


# Install npm packages in latest release
- task: CmdLine@2
  displayName: Install npm packages
  inputs:
    script: |

      sudo -u ubuntu bash << 'EOF'

      cd /home/ubuntu/TestFinance/current

      npm install

      EOF


# Keep only last 3 releases
- task: CmdLine@2
  displayName: Keep Last 3 Releases
  inputs:
    script: |

      sudo -u ubuntu bash << 'EOF'

      cd /home/ubuntu/TestFinance

      ls -dt RotaryFinanceAPI_*/ | tail -n +4 | xargs -r rm -rf

      echo "Remaining releases:"
      ls -d RotaryFinanceAPI_*/

      EOF


# Restart application using PM2
- task: CmdLine@2
  displayName: Restart PM2
  inputs:
    script: |

      sudo -u ubuntu bash << 'EOF'

      cd /home/ubuntu/TestFinance/current



      EOF
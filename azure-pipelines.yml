trigger:
  branches:
    include:
      - main

pool:
  name: UbuntuAws

steps:

# 1. Checkout source code
- checkout: self


# 2. Use Node.js 18
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Use Node.js 18'


# 3. Install dependencies in pipeline workspace
- task: CmdLine@2
  displayName: 'Install dependencies'
  inputs:
    script: |
      npm install
    workingDirectory: $(Build.SourcesDirectory)


# 4. Create release folder
- task: CmdLine@2
  displayName: 'Create Release Folder'
  inputs:
    script: |

      RELEASE_NAME=RotaryFinanceAPI_$(date +%Y%m%d%H%M%S)

      echo "Release Name: $RELEASE_NAME"

      sudo mkdir -p /home/ubuntu/TestFinance
      sudo mkdir -p /home/ubuntu/TestFinance/$RELEASE_NAME

      echo "##vso[task.setvariable variable=RELEASE_NAME]$RELEASE_NAME"


# 5. Copy project files to release folder
- task: CmdLine@2
  displayName: 'Copy Files to Release'
  inputs:
    script: |

      sudo rsync -av --delete \
      --exclude node_modules \
      --exclude .git \
      $(Build.SourcesDirectory)/ \
      /home/ubuntu/TestFinance/$(RELEASE_NAME)/


# 6. Update current symlink
- task: CmdLine@2
  displayName: 'Update Current Release'
  inputs:
    script: |

      sudo ln -sfn \
      /home/ubuntu/TestFinance/$(RELEASE_NAME) \
      /home/ubuntu/TestFinance/current


# 7. Install npm packages in latest folder
- task: CmdLine@2
  displayName: 'Install npm in latest release'
  inputs:
    script: |

      sudo -u ubuntu bash << 'EOF'
      cd /home/ubuntu/TestFinance/current
      npm install

      EOF


# 8. Keep only last 3 releases
- task: CmdLine@2
  displayName: 'Keep Last 3 Releases'
  inputs:
    script: |

      echo "Cleaning old releases..."

      sudo bash << 'EOF'

      cd /home/ubuntu/TestFinance || exit

      ls -dt RotaryFinanceAPI_*/ 2>/dev/null | tail -n +4 | xargs -r rm -rf

      echo "Remaining releases:"
      ls -d RotaryFinanceAPI_*/

      EOF


# 9. Restart PM2 application
- task: CmdLine@2
  displayName: 'Restart PM2 App'
  inputs:
    script: |

      sudo -u ubuntu bash << 'EOF'
      cd /home/ubuntu/TestFinance/current

      EOF
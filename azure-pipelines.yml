trigger:
- none

variables:
  nodeVersion: '18.x'
  artifactName: 'RotaryFinanceAPI'

  deployRoot: '/home/ubuntu/RotaryFinanceAPI'
  releasesPath: '/home/ubuntu/RotaryFinanceAPI/releases'
  currentPath: '/home/ubuntu/RotaryFinanceAPI/current'
  tempDeployPath: '/home/azureagent/RotaryFinanceAPI'


stages:

# ================= BUILD STAGE =================
- stage: Build
  displayName: Build Node Application

  jobs:
  - job: BuildJob
    pool:
      name: Build-Pool

    steps:

    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install Node.js

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.SourcesDirectory)'
        artifact: $(artifactName)
      displayName: Publish artifact



# ================= DEPLOY STAGE =================
- stage: Deploy
  displayName: Deploy Node API to Linux
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      name: UbuntuAws

    steps:

    - checkout: none

    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: $(artifactName)
        path: $(tempDeployPath)
      displayName: Download artifact


    - script: |
        set -e

        sudo -u ubuntu bash << 'EOF'

        echo "Preparing deployment..."

        mkdir -p $(releasesPath)

        PREVIOUS_RELEASE=$(readlink -f $(currentPath) || true)

        rollback() {
          echo "Deployment failed! Rolling back..."
          if [ -n "$PREVIOUS_RELEASE" ]; then
            ln -sfn $PREVIOUS_RELEASE $(currentPath)
            pm2 reload all
          fi
        }

        trap rollback ERR

        RELEASE_DIR=$(releasesPath)/$(date +%Y%m%d%H%M%S)

        echo "Creating new release folder: $RELEASE_DIR"
        mkdir -p $RELEASE_DIR

        echo "Copying application files..."
        rsync -av --exclude node_modules $(tempDeployPath)/ $RELEASE_DIR/

        if [ -d "$PREVIOUS_RELEASE/node_modules" ]; then
          echo "Reusing node_modules from previous release..."
          cp -R $PREVIOUS_RELEASE/node_modules $RELEASE_DIR/
        fi

        echo "Installing dependencies..."
        cd $RELEASE_DIR
        npm install --production

        #echo "Starting temporary app for health check..."
        #pm2 start index.js --name RotaryFinanceAPI-test --no-autorestart

        #echo "Waiting for app to start..."
        #sleep 5

        echo "Running health check..."
        curl -f http://localhost:3004/health

        echo "Health check passed"

        #echo "Stopping test process..."
        #pm2 delete RotaryFinanceAPI-test

        echo "Switching symlink to new release..."
        ln -sfn $RELEASE_DIR $(currentPath)

        echo "Restarting application..."
        cd $(currentPath)
        pm2 reload RotaryFinanceAPI || pm2 start src/server.js --name RotaryFinanceAPI
        pm2 save

        echo "Deployment successful"

        EOF

      displayName: Zero downtime deploy with health check


    - script: |
        echo "Cleaning old releases..."
        ls -dt $(releasesPath)/* | tail -n +6 | xargs -r rm -rf
      displayName: Cleanup old releases